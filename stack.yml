version: '3.8'

services:
  pacoticket:
    image: webdevops/php-nginx:8.2-alpine
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.hostname == manager-jedy
      resources:
        limits:
          cpus: "1"
          memory: 1024M
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
        window: 120s
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.pacoticket.rule=Host(`parceiros.seudominio.com`)"
        - "traefik.http.routers.pacoticket.entrypoints=websecure"
        - "traefik.http.routers.pacoticket.tls.certresolver=letsencrypt"
        - "traefik.http.services.pacoticket.loadbalancer.server.port=80"
    volumes:
      - /opt/parcerias/partners:/app
      - /opt/parcerias/partners/backend/.docker/nginx.conf:/opt/docker/etc/nginx/vhost.conf
    networks:
      - network_swarm_public
    environment:
      - WEB_DOCUMENT_ROOT=/app/frontend
      - PHP_DISPLAY_ERRORS=0
      - PHP_MEMORY_LIMIT=256M
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=pacoticket_parceiros
      - DB_USER=seu_usuario
      - DB_PASS=sua_senha
      - JWT_SECRET=trocar_por_string_64_chars_hex
      - JWT_REFRESH_SECRET=trocar_por_outra_string_64_chars
      - REDIS_URL=redis://pacoticket_redis:6379
      - APP_ENV=production
      - APP_URL=https://parceiros.seudominio.com
    working_dir: /app

  redis:
    image: redis:7-alpine
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.hostname == manager-jedy
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
      restart_policy:
        condition: any
    networks:
      - network_swarm_public

networks:
  network_swarm_public:
    external: true

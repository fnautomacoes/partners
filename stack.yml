version: '3.8'

services:
  pacoticket:
    image: webdevops/php-nginx:8.2-alpine
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.hostname == manager-jedy
      resources:
        limits:
          cpus: "1"
          memory: 1024M
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
        window: 120s
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.pacoticket.rule=Host(`${DOMAIN:-parceiros.pacoticket.com}`)"
        - "traefik.http.routers.pacoticket.entrypoints=websecure"
        - "traefik.http.routers.pacoticket.tls.certresolver=letsencrypt"
        - "traefik.http.services.pacoticket.loadbalancer.server.port=80"
    volumes:
      - '/root/pacoticket-parceiros:/app'
      - '/root/pacoticket-parceiros/backend/.docker/nginx.conf:/etc/nginx/conf.d/default.conf'
    networks:
      - network_swarm_public
    environment:
      - WEB_DOCUMENT_ROOT=/app/frontend
      - PHP_DISPLAY_ERRORS=0
      - PHP_MEMORY_LIMIT=256M
      - PHP_UPLOAD_MAX_FILESIZE=10M
      - PHP_POST_MAX_SIZE=10M
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-pacoticket_parceiros}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-28800}
      - JWT_REFRESH_EXPIRES_IN=${JWT_REFRESH_EXPIRES_IN:-604800}
      - REDIS_URL=redis://redis:6379
      - APP_ENV=production
      - APP_URL=https://${DOMAIN:-parceiros.pacoticket.com}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_MODE=${SMTP_MODE:-starttls}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-}
      - PACOTICKET_API_URL=${PACOTICKET_API_URL:-}
      - PACOTICKET_BEARER_TOKEN=${PACOTICKET_BEARER_TOKEN:-}
    working_dir: /app

  redis:
    image: redis:7-alpine
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.hostname == manager-jedy
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
    networks:
      - network_swarm_public

networks:
  network_swarm_public:
    external: true

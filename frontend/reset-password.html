<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinir Senha - PacoTicket Parceiros</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/fonts.css">
    <link rel="stylesheet" href="css/theme.css">
</head>
<body class="min-h-screen bg-gray-100 flex items-center justify-center">
    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
        <h1 class="text-2xl font-bold text-center text-gray-800 mb-6">Redefinir Senha</h1>

        <div id="noToken" class="hidden text-center text-red-600">
            <p>Link inválido ou expirado.</p>
            <a href="/login.html" class="text-blue-600 hover:underline mt-4 inline-block">Voltar para login</a>
        </div>

        <form id="resetForm" class="space-y-4">
            <div>
                <label for="newPassword" class="block text-sm font-medium text-gray-700 mb-1">Nova Senha</label>
                <input
                    type="password"
                    id="newPassword"
                    name="newPassword"
                    required
                    minlength="8"
                    class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                    placeholder="Mínimo 8 caracteres"
                >
            </div>

            <div>
                <label for="confirmPassword" class="block text-sm font-medium text-gray-700 mb-1">Confirmar Senha</label>
                <input
                    type="password"
                    id="confirmPassword"
                    name="confirmPassword"
                    required
                    minlength="8"
                    class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                    placeholder="Digite novamente"
                >
            </div>

            <div id="message" class="hidden text-sm text-center"></div>

            <button
                type="submit"
                id="submitBtn"
                class="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 transition-colors"
            >
                Redefinir Senha
            </button>
        </form>

        <div id="successMessage" class="hidden text-center">
            <p class="text-green-600 mb-4">Senha redefinida com sucesso!</p>
            <a href="/login.html" class="text-blue-600 hover:underline">Ir para login</a>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        const form = document.getElementById('resetForm');
        const noTokenDiv = document.getElementById('noToken');
        const successDiv = document.getElementById('successMessage');

        if (!token) {
            form.classList.add('hidden');
            noTokenDiv.classList.remove('hidden');
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const messageDiv = document.getElementById('message');
            const btn = document.getElementById('submitBtn');

            messageDiv.classList.add('hidden');

            if (newPassword !== confirmPassword) {
                messageDiv.textContent = 'As senhas não coincidem.';
                messageDiv.className = 'text-red-600 text-sm text-center';
                messageDiv.classList.remove('hidden');
                return;
            }

            if (newPassword.length < 8) {
                messageDiv.textContent = 'A senha deve ter pelo menos 8 caracteres.';
                messageDiv.className = 'text-red-600 text-sm text-center';
                messageDiv.classList.remove('hidden');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Processando...';

            try {
                const response = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    credentials: 'include',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, newPassword })
                });

                const result = await response.json();

                if (result.success) {
                    form.classList.add('hidden');
                    successDiv.classList.remove('hidden');
                } else {
                    messageDiv.textContent = result.message || 'Erro ao redefinir senha.';
                    messageDiv.className = 'text-red-600 text-sm text-center';
                    messageDiv.classList.remove('hidden');
                }
            } catch (err) {
                messageDiv.textContent = 'Erro de conexão. Tente novamente.';
                messageDiv.className = 'text-red-600 text-sm text-center';
                messageDiv.classList.remove('hidden');
            }

            btn.disabled = false;
            btn.textContent = 'Redefinir Senha';
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PacoTicket Parceiros</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/fonts.css">
    <link rel="stylesheet" href="css/theme.css">
</head>
<body class="min-h-screen bg-gray-100 flex items-center justify-center">
    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
        <img id="loginLogo" class="login-logo hidden" alt="Logo">
        <h1 id="loginTitle" class="text-2xl font-bold text-center text-gray-800 mb-6">PacoTicket Parceiros</h1>

        <form id="loginForm" class="space-y-4">
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    required
                    autocomplete="email"
                    class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                    placeholder="seu@email.com"
                >
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Senha</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    required
                    autocomplete="current-password"
                    class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                    placeholder="••••••••"
                >
            </div>

            <div id="errorMessage" class="hidden text-red-600 text-sm text-center"></div>

            <button
                type="submit"
                id="submitBtn"
                class="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 transition-colors"
            >
                Entrar
            </button>
        </form>

        <div class="mt-4 text-center">
            <a href="#" id="forgotPasswordLink" class="text-sm text-blue-600 hover:underline">Esqueci minha senha</a>
        </div>

        <!-- Forgot Password Modal -->
        <div id="forgotPasswordModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center">
            <div class="bg-white p-6 rounded-lg shadow-lg w-full max-w-sm">
                <h2 class="text-lg font-semibold mb-4">Recuperar Senha</h2>
                <form id="forgotPasswordForm">
                    <input
                        type="email"
                        id="forgotEmail"
                        required
                        class="w-full px-3 py-2 border border-gray-300 rounded-md mb-4"
                        placeholder="seu@email.com"
                    >
                    <div id="forgotMessage" class="hidden text-sm mb-4"></div>
                    <div class="flex gap-2">
                        <button type="button" id="cancelForgot" class="flex-1 px-4 py-2 border rounded-md hover:bg-gray-100">Cancelar</button>
                        <button type="submit" class="flex-1 px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700">Enviar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const btn = document.getElementById('submitBtn');
            const errorDiv = document.getElementById('errorMessage');

            btn.disabled = true;
            btn.textContent = 'Entrando...';
            errorDiv.classList.add('hidden');

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const result = await apiRequest('/api/auth/login', {
                    method: 'POST',
                    body: JSON.stringify({ email, password })
                });

                if (result.success) {
                    sessionStorage.setItem('user', JSON.stringify(result.data));
                    const role = result.data.role;
                    window.location.href = role === 'SUPERADMIN' ? '/superadmin.html' : '/partner.html';
                } else {
                    errorDiv.textContent = result.message || 'Erro ao fazer login';
                    errorDiv.classList.remove('hidden');
                }
            } catch (err) {
                errorDiv.textContent = 'Erro de conexão. Tente novamente.';
                errorDiv.classList.remove('hidden');
            }

            btn.disabled = false;
            btn.textContent = 'Entrar';
        });

        // Forgot password modal
        const modal = document.getElementById('forgotPasswordModal');
        document.getElementById('forgotPasswordLink').addEventListener('click', (e) => {
            e.preventDefault();
            modal.classList.remove('hidden');
        });
        document.getElementById('cancelForgot').addEventListener('click', () => {
            modal.classList.add('hidden');
        });

        document.getElementById('forgotPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('forgotEmail').value;
            const msgDiv = document.getElementById('forgotMessage');

            try {
                await apiRequest('/api/auth/forgot-password', {
                    method: 'POST',
                    body: JSON.stringify({ email })
                });
                msgDiv.textContent = 'Se o email existir, você receberá um link de recuperação.';
                msgDiv.className = 'text-green-600 text-sm mb-4';
                msgDiv.classList.remove('hidden');
            } catch (err) {
                msgDiv.textContent = 'Erro ao enviar. Tente novamente.';
                msgDiv.className = 'text-red-600 text-sm mb-4';
                msgDiv.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
